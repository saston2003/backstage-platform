trigger:
  branches:
    include:
      - main

parameters:
  - name: environment
    displayName: Deployment environment
    type: string
    default: ${{ values.environment }}
    values:
      - dev
      - test
      - prod

pool:
  vmImage: ubuntu-latest

variables:
  serviceName: ${{ values.name }}
  ownerGroup: ${{ values.owner }}

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: Install Node.js

  - script: npm install
    displayName: Install dependencies

  - script: npm test
    displayName: Run tests

  - template: pipelines/standard-deploy.yml
    parameters:
      serviceName: ${{ values.name }}
      environment: {% raw %}${{ parameters.environment }}{% endraw %}
      ownerGroup: ${{ values.owner }}
