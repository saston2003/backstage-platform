apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-devops-service
  title: Create Governed Azure DevOps Service
  description: Start here when the repo does not exist yet. Backstage creates a compliant Azure DevOps repo with standard naming, pipeline templates, environment controls, RBAC metadata, and catalog registration.
  tags: [azure-devops, service, pipeline, governance]
spec:
  owner: user:guest
  type: service
  parameters:
    - title: Service Details
      required:
        - name
        - description
      properties:
        name:
          title: Service Name
          type: string
          description: Lowercase kebab-case service name used for the repo, pipeline, and catalog entity.
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          default: Service created from Backstage and published to Azure DevOps.
        owner:
          title: Owner
          type: string
          description: Backstage group that owns the service and receives contributor access in the RBAC manifest.
          default: guests
    - title: Governance Controls
      required:
        - environment
      properties:
        environment:
          title: Environment
          type: string
          description: Deployment environment allowed by the platform standard pipeline.
          default: dev
          enum:
            - dev
            - test
            - prod
          ui:enumNames:
            - Development
            - Test
            - Production
    - title: Azure DevOps Target
      required:
        - organization
        - project
      properties:
        organization:
          title: Organization
          type: string
          default: sastonz400
        project:
          title: Project
          type: string
          default: Agile Planning and Portfolio Management with Azure Boards
  steps:
    - id: fetchBase
      name: Fetch Starter Code
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          environment: ${{ parameters.environment }}
          organization: ${{ parameters.organization }}
          project: ${{ parameters.project }}

    - id: publish
      name: Create Azure DevOps Repo and Push Code
      action: publish:azure
      input:
        repoUrl: 'dev.azure.com?organization=${{ parameters.organization }}&project=${{ parameters.project }}&repo=${{ parameters.name }}'
        defaultBranch: main
        description: ${{ parameters.description }}

    - id: createPipeline
      name: Create Azure DevOps Pipeline
      action: azure:pipeline:create
      input:
        organization: ${{ parameters.organization }}
        project: ${{ parameters.project }}
        repo: ${{ parameters.name }}
        pipelineName: ${{ parameters.name }}
        yamlPath: /azure-pipelines.yml

    - id: register
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Governance standard
        url: ${{ steps.publish.output.remoteUrl }}?path=/pipelines/standard-deploy.yml
      - title: Azure DevOps pipeline
        url: ${{ steps.createPipeline.output.pipelineUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
