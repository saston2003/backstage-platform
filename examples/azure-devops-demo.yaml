  annotations:
    backstage.io/source-location: url:https://dev.azure.com/sastonz400/Agile%20Planning%20and%20Portfolio%20Management%20with%20Azure%20Boards/_git/PartsUnlimited
    backstage.io/view-url: https://dev.azure.com/sastonz400/Agile%20Planning%20and%20Portfolio%20Management%20with%20Azure%20Boards/_git/PartsUnlimited
    backstage.io/edit-url: https://dev.azure.com/sastonz400/Agile%20Planning%20and%20Portfolio%20Management%20with%20Azure%20Boards/_git/PartsUnlimited?path=/catalog-info.yaml
    backstage.io/techdocs-ref: dir:.
  links:
    - title: Azure Repo
